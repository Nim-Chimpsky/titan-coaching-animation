<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Titan Coaching</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#090909;margin:0;padding:0;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.canvas-wrap{width:min(100vw,100vh);aspect-ratio:1;position:relative}
canvas{width:100%;height:100%;display:block}
.copy-side{flex:1;padding:40px 60px 40px 20px;display:flex;flex-direction:column;justify-content:center}
.phase-block{padding:28px 0;border-top:1px solid rgba(255,255,255,0.07);opacity:0.22;transition:opacity 1.6s ease}
.phase-block.active{opacity:1}
.phase-block:last-child{border-bottom:1px solid rgba(255,255,255,0.07)}
.phase-num{font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,0.28);margin-bottom:8px}
.phase-title{font-size:16px;font-weight:500;color:rgba(255,255,255,0.88);line-height:1.35;margin-bottom:8px;letter-spacing:-.01em}
.phase-body{font-size:13px;color:rgba(255,255,255,0.36);line-height:1.65}
.progress-bar{position:absolute;bottom:0;left:0;height:1px;background:rgba(255,255,255,0.07);width:100%}
.progress-fill{height:100%;background:rgba(255,255,255,0.3);width:0%}
@media(max-width:768px){.layout{flex-direction:column;min-height:auto}.anim-side{padding:30px 20px 10px}.copy-side{padding:10px 20px 40px}.canvas-wrap{max-width:380px}}

#section-nav {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
  padding: 0 20px;
}
.sec-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 10px 18px;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
  color: rgba(255,255,255,0.4);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}
.sec-btn:hover {
  border-color: rgba(255,255,255,0.35);
  color: rgba(255,255,255,0.7);
}
.sec-btn.active {
  border-color: rgba(255,255,255,0.6);
  color: rgba(255,255,255,0.9);
  background: rgba(255,255,255,0.05);
}
.sec-num {
  font-size: 10px;
  letter-spacing: 0.1em;
  opacity: 0.6;
}
.sec-label {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
</style>
</head>
<body>
<div class="canvas-wrap">
  <canvas id="anim"></canvas>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
</div>

// Section nav globals
const SECTION_TIMES = [0, 6.3, 13.2];

(function(){

// Preload avatar images
const AVATAR_IMGS = AVATARS.map(src => {
  const img = new Image();
  img.src = src;
  return img;
});

const canvas=document.getElementById('anim');
const wrap=canvas.parentElement;
const DPR=Math.min(window.devicePixelRatio||1,2);
const ctx=canvas.getContext('2d');
const SZ=()=>canvas.width/DPR;
let projCache=null, lastSZ=0;

function resize(){
  const sz=wrap.offsetWidth;
  canvas.width=sz*DPR; canvas.height=sz*DPR;
  projCache=null;
}
resize();
window.addEventListener('resize',resize);

// ── Easing
const ease=t=>t<.5?2*t*t:-1+(4-2*t)*t;
const easeOut=t=>1-(1-t)*(1-t);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const il=(a,b,v)=>clamp((v-a)/(b-a),0,1);
const lerp=(a,b,t)=>a+(b-a)*t;

// ── Projection
const ROT_LON=-72, ROT_LAT=10;

function getProj(sz, rotOffset){
  const off=rotOffset||0;
  if(projCache&&lastSZ===sz&&Math.abs(off)<0.001) return projCache;
  const cx=sz*0.5, cy=sz*0.54, R=sz*0.5;
  const rlat=ROT_LAT*Math.PI/180;
  const cosR=Math.cos(rlat), sinR=Math.sin(rlat);
  const result=DOTS.map(d=>{
    const phi=d[1]*Math.PI/180;
    const lam=(d[0]-ROT_LON-off)*Math.PI/180;
    const x0=Math.cos(phi)*Math.sin(lam);
    const y0=Math.sin(phi);
    const z0=Math.cos(phi)*Math.cos(lam);
    const y1=y0*cosR-z0*sinR;
    const z1=y0*sinR+z0*cosR;
    return{x:cx+R*x0,y:cy-R*y1*0.9,z:z1,r:d[2],r2:d[3],phase:d[4],isElite:d[5]===1};
  });
  if(Math.abs(off)<0.001){ projCache=result; lastSZ=sz; }
  return result;
}

// ── Graph
function getGraphPts(sz){
  const pad=sz*0.12;
  const gx0=pad*1.2,gy0=pad*1.0,gw=sz-pad*2.4,gh=sz-pad*2.2,base=gy0+gh;
  const pts=GRAPH_NORM.map(p=>(({x:gx0+p.t*gw,y:Math.max(gy0+10,base-p.v*gh)})));
  // Curve naturally exits via extended GRAPH_NORM points
  return {pts,gx0,gy0,gw,gh,base};
}

// ── Timeline
const T={p0:3.0,fade:1.5,gather:1.8,hold:1.2,elim:3.0,grow:1.2,travel:1.5,graph:9.0,fadeout:1.5};
const MARKS={p0:0,fade:3.0,gather:4.5,hold:6.3,elim:7.5,grow:10.5,travel:11.7,graph:13.2,fadeout:22.2};
const LOOP=23.7;

function getState(sec){
  const globeFull = sec<MARKS.fade ? 1 : clamp(1-ease(il(MARKS.fade,MARKS.fade+T.fade,sec)),0,1);
  const dimmed    = sec>=MARKS.fade ? ease(il(MARKS.fade,MARKS.fade+T.fade,sec)) : 0;
  const eliteVis  = sec>=MARKS.fade ? ease(il(MARKS.fade,MARKS.fade+T.fade,sec)) : 0; // fades out via leadT in draw()
  const floatP    = ease(il(MARKS.gather,MARKS.gather+T.gather,sec));
  const elimP     = ease(il(MARKS.elim,MARKS.elim+T.elim,sec));
  const growP     = ease(il(MARKS.grow,MARKS.grow+T.grow,sec));
  const travelP   = 0; // no travel — coach stays in place
  const graphAlpha= ease(il(MARKS.graph, MARKS.graph+1.0, sec));
  const graphReveal=il(MARKS.graph,MARKS.graph+T.graph,sec);
  const loopGlobe = sec>=MARKS.fadeout ? ease(il(MARKS.fadeout,LOOP,sec)) : 0;
  let phase=0;
  if(sec>=MARKS.fade) phase=1;
  if(sec>=MARKS.travel) phase=2;
  if(sec>=MARKS.fadeout) phase=0;
  return{globeFull,dimmed,eliteVis,floatP,elimP,growP,travelP,graphAlpha,graphReveal,loopGlobe,phase};
}

// ── Draw
let t0=null;

function draw(elapsed){
  const sz=SZ();
  const sec=elapsed%LOOP;
  const s=getState(sec);
  const cx=sz*0.5, cy=sz*0.54, R=sz*0.5;
  // Compute leadT here so match dot can use it
  const leadT = s.graphReveal * 0.95;
  // Pre-compute graph camera for match dot positioning during graph phase
  // (mirrors the graph section camera math)
  let graphMatchX = 0, graphMatchY = 0;
  if(s.graphAlpha > 0.001){
    const _matchOff = CLUSTER_OFFSETS[MATCH_IDX]||[0,0];
    const _coachSX = cx + R * _matchOff[0];
    const _coachSY = cy + R * _matchOff[1] * 0.9;
    const _GW = sz * 2.6;
    const _COACH_GT = 0.18;
    const _coachGX = _GW * _COACH_GT;
    const _curveY = t => sz*1.8*(1-Math.pow(Math.max(t,0),2.2));
    const _coachGY = _curveY(_COACH_GT);
    const _endZoom = 0.50;
    const _zoom = lerp(1.0, _endZoom, ease(s.graphReveal));
    const _graphMidGX = _GW * 0.50;
    const _graphMidGY = _curveY(0.50);
    const _camGX1 = _graphMidGX - (sz*0.5 - cx) / _endZoom;
    const _camGY1 = _graphMidGY - (sz*0.48 - cy) / _endZoom;
    const _camGX0 = _coachGX - (_coachSX - cx);
    const _camGY0 = _coachGY - (_coachSY - cy);
    const _camGX = lerp(_camGX0, _camGX1, ease(s.graphReveal));
    const _camGY = lerp(_camGY0, _camGY1, ease(s.graphReveal));
    graphMatchX = (_coachGX - _camGX) * _zoom + cx;
    graphMatchY = (_coachGY - _camGY) * _zoom + cy;
  }

  const rotDur=MARKS.fade+T.fade;
  const introRot=18*Math.max(0,1-ease(clamp((elapsed%LOOP)/rotDur,0,1)));
  const proj=getProj(sz,introRot);
  const matchDot=proj[MATCH_IDX];

  ctx.save();
  ctx.scale(DPR,DPR);
  ctx.clearRect(0,0,sz,sz);

  const order=[...proj.keys()].sort((a,b)=>proj[a].z-proj[b].z);

  for(const idx of order){
    const d=proj[idx];
    if(d.z<0.04) continue;
    const dep=clamp(d.z,0,1);
    const isMatch=idx===MATCH_IDX;
    const ox=Math.sin(elapsed*0.4+d.phase*Math.PI*2)*sz*0.003*d.r;
    const oy=Math.cos(elapsed*0.28+d.phase*Math.PI*2+1.3)*sz*0.003*d.r2;
    const dx=d.x+ox, dy=d.y+oy;

    // Non-elite: single draw path
    if(!d.isElite && !isMatch){
      const baseAlpha=0.12+dep*0.44+d.r*0.14;
      const baseSize=clamp(0.18+dep*0.38+d.r*0.22,0.14,0.70);
      const g=Math.floor(75+d.r*85+dep*45);
      let alpha=0, size=baseSize;
      if(s.globeFull>0.001 && s.dimmed<0.001){
        alpha=s.globeFull*baseAlpha;
      } else if(s.dimmed>0.001){
        const dotRand=(d.r*0.6+d.r2*0.4+d.phase*0.3)%1.0;
        const popAt=dotRand*0.65;
        const popP=clamp((s.dimmed-popAt)/0.28,0,1);
        const globeA=s.globeFull*baseAlpha;
        if(popP<=0){
          alpha=globeA>0?Math.min(baseAlpha,globeA):baseAlpha;
        } else if(popP<0.3){
          const t=popP/0.3;
          size=baseSize*(1.0+t*0.4);
          alpha=globeA>0?Math.min(baseAlpha,globeA):baseAlpha;
        } else {
          const t=(popP-0.3)/0.7;
          size=baseSize*1.4*(1-t);
          alpha=baseAlpha*Math.pow(1-t,1.5);
          if(globeA>0) alpha=Math.min(alpha,globeA);
        }
      }
      if(alpha<0.004||size<0.05) continue;
      ctx.beginPath();ctx.arc(dx,dy,size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${g},${g},${g},${alpha.toFixed(3)})`;
      ctx.fill();
    }

    // Elite dots
    if(s.eliteVis>0.001 && d.isElite){
      const off=CLUSTER_OFFSETS[idx]||[0,0];
      const tx=cx+R*off[0], ty=cy+R*off[1]*0.9;
      const _fxBase=lerp(dx,tx,s.floatP);
      const _fyBase=lerp(dy,ty,s.floatP);
      // During graph phase, match dot follows camera transform
      const fx = (isMatch && s.graphAlpha>0.001) ? graphMatchX : _fxBase;
      const fy = (isMatch && s.graphAlpha>0.001) ? graphMatchY : _fyBase;
      const elimT=isMatch?2.0:(ELIM_ORDER[idx]??0);
      const safeElimT=Math.min(elimT,0.80);
      const flashP=clamp((s.elimP-safeElimT)/0.08,0,1);
      const fadeP=clamp((s.elimP-safeElimT-0.08)/0.18,0,1);
      const gone=!isMatch&&fadeP>=1.0;
      if(gone) continue;

      if(!isMatch && flashP>0){
        const dotSz=clamp(1.4*(1+flashP<1?flashP*0.8:1.8*(1-(flashP-0)/1)),0,3.5);
        const scalePop=flashP<1?1.0+flashP*0.8:1.8*(1-fadeP);
        const dSz=clamp(1.4*scalePop,0,3.5);
        const totalAlpha=flashP<1?1.0:(1-fadeP);
        if(flashP>0&&flashP<1){
          const ringR=dSz*2.5+flashP*8;
          ctx.beginPath();ctx.arc(fx,fy,ringR,0,Math.PI*2);
          ctx.strokeStyle=`rgba(195,130,90,${((1-flashP)*0.25).toFixed(3)})`;
          ctx.lineWidth=0.8;ctx.stroke();
        }
        const rr=210,gg=Math.floor(140*Math.max(0,1-flashP*0.7)),bb=Math.floor(90*Math.max(0,1-flashP*0.5));
        ctx.beginPath();ctx.arc(fx,fy,dSz,0,Math.PI*2);
        ctx.fillStyle=`rgba(${rr},${gg},${bb},${(s.eliteVis*totalAlpha).toFixed(3)})`;
        ctx.fill();

      } else if(isMatch){
        const lastP=clamp((s.elimP-0.78)/0.22,0,1);
        // During graph phase, size matches graph avatar (zoom-scaled)
        const _endZoom2 = 0.50;
        const _zoom2 = lerp(1.0, _endZoom2, ease(s.graphReveal));
        const matchSize = s.graphAlpha > 0.001
          ? sz * 0.038 * _zoom2
          : clamp(1.4+lastP*sz*0.038+s.growP*2.0,1.0,sz*0.048);
        // Match dot stays visible the whole time — it IS the first graph coach
        const matchAlpha = clamp(s.eliteVis*(0.7+lastP*0.3),0,1);
        if((lastP>0.05||s.growP>0) && s.graphAlpha<0.001){
          const pr=(elapsed*0.5)%1;
          const ringStr=Math.max(lastP,s.growP);
          [0,0.5].forEach(off=>{
            const pv=(pr+off)%1;
            ctx.beginPath();ctx.arc(fx,fy,matchSize*1.4+pv*22,0,Math.PI*2);
            ctx.strokeStyle=`rgba(255,255,255,${(ringStr*(1-pv)*0.2).toFixed(3)})`;
            ctx.lineWidth=0.7;ctx.stroke();
          });
        }
        // Always show avatar image when big enough — no jitter at transition
        if(AVATAR_IMGS[0].complete && matchSize > 3){
          ctx.save();ctx.globalAlpha=matchAlpha;
          ctx.beginPath();ctx.arc(fx,fy,matchSize,0,Math.PI*2);ctx.clip();
          ctx.drawImage(AVATAR_IMGS[0],fx-matchSize,fy-matchSize,matchSize*2,matchSize*2);
          ctx.restore();
          ctx.beginPath();ctx.arc(fx,fy,matchSize,0,Math.PI*2);
          ctx.strokeStyle=`rgba(255,255,255,${(matchAlpha*0.7).toFixed(3)})`;
          ctx.lineWidth=0.8;ctx.stroke();
        } else {
          ctx.beginPath();ctx.arc(fx,fy,matchSize,0,Math.PI*2);
          ctx.fillStyle=`rgba(255,255,255,${matchAlpha.toFixed(3)})`;
          ctx.fill();
        }
      } else {
        const bgSize=clamp(0.18+dep*0.38+d.r*0.22,0.14,0.70);
        const fullSize=clamp(1.3+d.r*0.3,0.7,2.0);
        const size=bgSize+(fullSize-bgSize)*ease(s.eliteVis);
        const alpha=s.eliteVis*(0.55+d.r*0.12);
        const gv=Math.floor(185+d.r*55);
        ctx.beginPath();ctx.arc(fx,fy,size,0,Math.PI*2);
        ctx.fillStyle=`rgba(${gv},${gv},${gv},${alpha.toFixed(3)})`;
        ctx.fill();
      }
    }
  }

  // ── TITAN LOGO
  {
    const logoAlpha=s.eliteVis*clamp((s.floatP-0.85)/0.15,0,1)*clamp(1-s.travelP/0.25,0,1)*(1-s.graphAlpha);
    if(logoAlpha>0.002){
      ctx.save();
      const logoW=sz*0.07;
      const logoH=logoW*(1306/1841);
      const logoX=cx-logoW/2;
      const logoY=cy-logoH/2;
      const scaleX=logoW/1841;
      const scaleY=logoH/1306;
      ctx.translate(logoX,logoY);
      ctx.scale(scaleX,scaleY);
      ctx.globalAlpha=logoAlpha*1.0;
      ctx.fillStyle='rgba(255,255,255,1)';
      ctx.beginPath();ctx.moveTo(277,1305);ctx.lineTo(268,1293);ctx.lineTo(457,335);ctx.lineTo(461,332);ctx.lineTo(665,344);ctx.lineTo(668,348);ctx.lineTo(578,1296);ctx.lineTo(568,1305);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(225,505);ctx.lineTo(235,495);ctx.lineTo(921,495);ctx.lineTo(921,627);ctx.lineTo(235,627);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(14,6);ctx.lineTo(0,16);ctx.lineTo(0,274);ctx.lineTo(9,284);ctx.lineTo(457,335);ctx.lineTo(461,332);ctx.lineTo(665,344);ctx.lineTo(668,348);ctx.lineTo(747,351);ctx.lineTo(921,352);ctx.lineTo(921,160);ctx.lineTo(412,115);ctx.lineTo(14,6);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(1563,1305);ctx.lineTo(1573,1293);ctx.lineTo(1383,335);ctx.lineTo(1380,332);ctx.lineTo(1176,344);ctx.lineTo(1173,348);ctx.lineTo(1263,1296);ctx.lineTo(1273,1305);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(1615,505);ctx.lineTo(1605,495);ctx.lineTo(919,495);ctx.lineTo(919,627);ctx.lineTo(1605,627);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(1826,6);ctx.lineTo(1840,16);ctx.lineTo(1840,274);ctx.lineTo(1832,284);ctx.lineTo(1383,335);ctx.lineTo(1380,332);ctx.lineTo(1176,344);ctx.lineTo(1173,348);ctx.lineTo(1094,351);ctx.lineTo(919,352);ctx.lineTo(919,160);ctx.lineTo(1428,115);ctx.lineTo(1826,6);ctx.closePath();ctx.fill();
      ctx.restore();
    }
  }



  // ── GHOST GLOBE UNDER GRAPH
  if(s.graphAlpha>0.001){
    for(const idx of order){
      const d=proj[idx];
      if(d.z<0.04) continue;
      const dep=clamp(d.z,0,1);
      const size=clamp(0.14+dep*0.28+d.r*0.15,0.1,0.55);
      const alpha=s.graphAlpha*0.055*(0.3+dep*0.5);
      ctx.beginPath();ctx.arc(d.x,d.y,size,0,Math.PI*2);
      ctx.fillStyle=`rgba(60,60,60,${alpha.toFixed(3)})`;
      ctx.fill();
    }
  }

  // ── GRAPH: continuous from circle phase — coach stays, line grows in
  if(s.graphAlpha>0.001){
    const ga  = s.graphAlpha;
    const rev = s.graphReveal; // 0→1

    // Coach is still at their ring position on screen — do NOT move them
    const matchOff = CLUSTER_OFFSETS[MATCH_IDX]||[0,0];
    const coachSX  = cx + R * matchOff[0]; // coach screen X (fixed)
    const coachSY  = cy + R * matchOff[1] * 0.9; // coach screen Y (fixed)

    // At rev=0: no transform, coach is centered on screen
    // At rev=1: camera has panned+zoomed so coach is near bottom-left,
    //           full curve visible across canvas

    // Camera: at rev=0 zoom=1, no pan (coach already centered from circle phase)
    //         at rev=1 zoom out + pan so coach ends up bottom-left

    // Build curve in "graph space" then transform to screen via camera
    // Graph space: coach at (0,0), line goes from (-inf, down) to (+inf, up)
    // At rev=0: identity (coach centered on screen)
    // At rev=1: zoomed out, coach at bottom-left

    const N = 60;
    const GW = sz * 2.8; // graph space width (wide enough for all coaches)

    // Graph space positions — coach at t=0.18
    const COACH_GT = 0.18;
    const coachGX  = GW * COACH_GT;
    const graphCurveY = t => {
      const v = Math.pow(Math.max(t,0), 2.2);
      return sz * 1.8 * (1 - v); // 0 at top, sz*1.8 at bottom
    };
    const coachGY = graphCurveY(COACH_GT);

    // Camera: maps graph space to screen space
    // rev=0: coach centered, zoom=1
    // rev=1: coach at bottom-left (sz*0.14, sz*0.80), zoom=0.52
    const endZoom = 0.50;
    const zoom    = lerp(1.0, endZoom, ease(rev));
    // Where we want coach on screen at end
    const endCSX  = sz * 0.14, endCSY = sz * 0.80;
    // At zoom=endZoom, coach maps to: (coachGX-camGX)*endZoom + cx = endCSX
    // So camGX = coachGX - (endCSX-cx)/endZoom
    // At rev=0: camera positioned so coach graph position maps to coachSX/coachSY on screen
    // toScreen(coachGX, coachGY) = (coachGX - camGX)*zoom + cx = coachSX
    // At zoom=1: camGX = coachGX - (coachSX - cx)
    const camGX0  = coachGX - (coachSX - cx);
    const camGY0  = coachGY - (coachSY - cy);
    // At end: center on middle of graph so all coaches visible
    const graphMidGX = GW * 0.50;
    const graphMidGY = graphCurveY(0.50);
    const camGX1  = graphMidGX - (sz*0.5 - cx) / endZoom;
    const camGY1  = graphMidGY - (sz*0.48 - cy) / endZoom;
    const camGX   = lerp(camGX0, camGX1, ease(rev));
    const camGY   = lerp(camGY0, camGY1, ease(rev));

    const toScreen = (gx, gy) => ({
      x: (gx - camGX) * zoom + cx,
      y: (gy - camGY) * zoom + cy,
    });

    // Build curve screen points
    const curvePts = [];
    for(let i=0; i<=N; i++){
      const t = i/N;
      const gx = GW * t;
      const gy = graphCurveY(t);
      curvePts.push({...toScreen(gx, gy), t});
    }

    // Lead position
    // leadT computed above in draw()
    const leadGX = GW * leadT;
    const leadGY = graphCurveY(leadT);
    const leadSP = toScreen(leadGX, leadGY);
    const startSP = toScreen(0, graphCurveY(0));
    const leadX = leadSP.x;
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, -sz*2, leadSP.x + 4, sz*6); // always from left edge to tip
    ctx.clip();

    // Fill under curve
    const topSP = toScreen(GW*0.5, 0);
    const botSP = toScreen(GW*0.5, sz*1.8);
    const grd = ctx.createLinearGradient(0, topSP.y, 0, botSP.y);
    grd.addColorStop(0, `rgba(255,255,255,${(ga*0.22).toFixed(3)})`);
    grd.addColorStop(0.5, `rgba(255,255,255,${(ga*0.10).toFixed(3)})`);
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.moveTo(curvePts[0].x, curvePts[0].y);
    for(let i=1;i<curvePts.length;i++) ctx.lineTo(curvePts[i].x, curvePts[i].y);
    ctx.lineTo(curvePts[N].x, botSP.y + sz);
    ctx.lineTo(curvePts[0].x, botSP.y + sz);
    ctx.closePath();
    ctx.fillStyle = grd; ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(curvePts[0].x, curvePts[0].y);
    for(let i=1;i<curvePts.length;i++) ctx.lineTo(curvePts[i].x, curvePts[i].y);
    ctx.strokeStyle = `rgba(255,255,255,${(ga*0.7).toFixed(3)})`;
    ctx.lineWidth = 1.4 / zoom;
    ctx.stroke();
    ctx.restore(); // clip

    // Leading pulse
    const labels = ['Series C', 'IPO'];
    const coachGTs = [0.52, 0.80]; // graph-space t values — coach 0 stays as match dot

    if(rev > 0.01 && rev < 0.99){
      // Use leadSP directly — it's already the exact screen position of the line tip
      const atCoach = coachGTs.some(ct => Math.abs(leadT - ct) < 0.04);
      if(!atCoach){
        const pulse = (elapsed * 1.5) % 1;
        ctx.beginPath();
        ctx.arc(leadSP.x, leadSP.y, 2 + pulse * 12, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,255,255,${(ga*(1-pulse)*0.25).toFixed(3)})`;
        ctx.lineWidth = 0.8; ctx.stroke();
        ctx.beginPath();
        ctx.arc(leadSP.x, leadSP.y, 3.5, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${(ga*0.95).toFixed(3)})`;
        ctx.fill();
      }
    }

    // ── Coach avatars + labels ─────────────────────────────────────
    // Coach 0: the match coach — at coachT on curve, visible from start
    // Coaches 1-2: appear as line reaches them, placed at t=0.55 and t=0.82

    coachGTs.forEach((ct, i) => {
      const distFromTip = leadT - ct;
      // All coaches appear when line reaches them
      if(distFromTip < -0.005) return;
      const dv = clamp((distFromTip + 0.002) * 80, 0, 1) * ga; // appear instantly as line hits
      if(dv < 0.001) return;

      const sp = toScreen(GW * ct, graphCurveY(ct));
      const px = sp.x, py = sp.y;
      const ar = sz * 0.038 * zoom;

      const img = AVATAR_IMGS[Math.min(i, AVATAR_IMGS.length-1)];
      if(img && img.complete && ar > 2){
        ctx.save();ctx.globalAlpha=dv;
        ctx.beginPath();ctx.arc(px,py,ar,0,Math.PI*2);ctx.clip();
        ctx.drawImage(img, px-ar, py-ar, ar*2, ar*2);
        ctx.restore();
        ctx.beginPath();ctx.arc(px,py,ar,0,Math.PI*2);
        ctx.strokeStyle=`rgba(255,255,255,${(dv*0.55).toFixed(3)})`;
        ctx.lineWidth=Math.max(0.5, zoom); ctx.stroke();
      } else if(ar > 0.5){
        ctx.beginPath();ctx.arc(px,py,Math.max(ar,2),0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${dv.toFixed(3)})`; ctx.fill();
      }

      // Label
      const labelSize = Math.max(7, Math.floor(sz * 0.022 * zoom));
      ctx.globalAlpha = dv * 0.75;
      ctx.font = `500 ${labelSize}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,1)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(labels[i], px, py + ar + 6);
      ctx.globalAlpha = 1;
    });

    ctx.restore(); // restore from ctx.save() at top of graph block
  }

  ctx.restore();

  // Progress bar
  const curSec=elapsed%LOOP;
  document.getElementById('prog').style.width=((curSec/LOOP)*100)+'%';
}

function loop(ts){
  if(!t0) t0=ts;
  draw((ts-t0)/1000);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();

window.jumpTo = function(sec){
  const now=performance.now();
  t0=now-SECTION_TIMES[sec]*1000;
};

// postMessage API for Webflow integration
window.addEventListener('message', function(e){
  if(e.data && typeof e.data.section === 'number'){
    window.jumpTo(e.data.section);
  }
});
</script>
</body>
</html>
