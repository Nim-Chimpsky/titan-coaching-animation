<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Globe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; overflow: hidden; display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
  #globe-container { position: relative; }
  canvas { display: block; }

  #loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 2px;
    z-index: 100; background: #0f0f0f; transition: opacity 0.8s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="globe-container"></div>
<div id="loading"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script>
(async function () {

  /* ── Scene Setup ─────────────────────────────────────────── */

  // Square canvas sized to the smaller viewport dimension
  const SIZE = Math.min(innerWidth, innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
  camera.position.z = 2.8;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(SIZE, SIZE);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x0f0f0f, 1);              // black for testing
  //renderer.setClearColor(0x000000, 0);            // transparent for production
  document.getElementById('globe-container').appendChild(renderer.domElement);

  const globe = new THREE.Group();
  scene.add(globe);

  /* ── Load & Rasterize Land Data ──────────────────────────── */

  // Use per-country polygons for cleaner Arctic geometry
  const res = await fetch('https://unpkg.com/world-atlas@2/countries-50m.json');
  const topology = await res.json();
  const countriesGeoJSON = topojson.feature(topology, topology.objects.countries);
  const features = countriesGeoJSON.features;

  // Draw land onto an equirectangular canvas
  const MAP_W = 3600, MAP_H = 1800;                // 0.1° per pixel
  const mapCanvas = document.createElement('canvas');
  mapCanvas.width = MAP_W;
  mapCanvas.height = MAP_H;
  const ctx = mapCanvas.getContext('2d');

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, MAP_W, MAP_H);
  ctx.fillStyle = '#fff';

  // Threshold for detecting antimeridian crossings (in degrees)
  const AM_THRESHOLD = 170;

  function drawRings(rings) {
    rings.forEach(ring => {
      // Check if this ring crosses the antimeridian
      let crossesAM = false;
      for (let i = 1; i < ring.length; i++) {
        if (Math.abs(ring[i][0] - ring[i - 1][0]) > AM_THRESHOLD) {
          crossesAM = true;
          break;
        }
      }

      if (!crossesAM) {
        // Simple case — no antimeridian crossing
        ctx.beginPath();
        ring.forEach((c, i) => {
          const px = ((c[0] + 180) / 360) * MAP_W;
          const py = ((90 - c[1]) / 180) * MAP_H;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        });
        ctx.closePath();
        ctx.fill();
        return;
      }

      // Split ring into left-side (lng < 0) and right-side (lng >= 0) sub-paths
      const leftPts  = [];
      const rightPts = [];

      for (let i = 0; i < ring.length; i++) {
        const c    = ring[i];
        const prev = i > 0 ? ring[i - 1] : null;

        if (prev && Math.abs(c[0] - prev[0]) > AM_THRESHOLD) {
          // Interpolate latitude at the ±180 edge
          let dLng = c[0] - prev[0];
          if (dLng > 180) dLng -= 360;
          if (dLng < -180) dLng += 360;
          const t = prev[0] >= 0
            ? (180 - prev[0]) / dLng
            : (-180 - prev[0]) / dLng;
          const edgeLat = prev[1] + t * (c[1] - prev[1]);
          rightPts.push([180,  edgeLat]);
          leftPts.push([-180, edgeLat]);
        }

        if (c[0] >= 0) rightPts.push(c);
        else           leftPts.push(c);
      }

      // Draw each sub-path
      [leftPts, rightPts].forEach(pts => {
        if (pts.length < 3) return;
        ctx.beginPath();
        pts.forEach((c, i) => {
          const px = ((c[0] + 180) / 360) * MAP_W;
          const py = ((90 - c[1]) / 180) * MAP_H;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        });
        ctx.closePath();
        ctx.fill();
      });
    });
  }

  features.forEach(f => {
    const g = f.geometry;
    if (g.type === 'MultiPolygon') g.coordinates.forEach(drawRings);
    else if (g.type === 'Polygon') drawRings(g.coordinates);
  });

  /* ── Erase Great Lakes ───────────────────────────────────── */

  ctx.fillStyle = '#000';

  const greatLakes = [
    // Lake Superior
    [[-92.1,46.7],[-91.2,46.6],[-90.3,46.7],[-89.5,46.9],[-88.8,47.1],[-87.8,46.5],
     [-86.8,46.6],[-85.5,46.8],[-84.8,46.5],[-84.4,46.8],[-84.5,47.2],[-84.8,47.6],
     [-85.5,48.0],[-86.2,48.3],[-87.0,48.5],[-87.8,48.7],[-88.5,48.6],[-89.2,48.3],
     [-89.8,48.0],[-90.5,47.6],[-91.2,47.2],[-91.8,47.0],[-92.1,46.7]],
    // Lake Michigan
    [[-87.8,45.8],[-87.5,45.3],[-87.0,44.7],[-86.6,44.0],[-86.3,43.4],[-86.2,42.8],
     [-86.4,42.2],[-86.7,41.8],[-87.0,41.6],[-87.5,41.6],[-87.8,41.8],[-87.8,42.3],
     [-87.6,42.8],[-87.4,43.3],[-87.3,43.8],[-87.2,44.3],[-87.3,44.8],[-87.5,45.3],
     [-87.8,45.8]],
    // Lake Huron
    [[-84.5,45.8],[-84.1,45.3],[-83.6,44.8],[-83.2,44.3],[-82.8,43.8],[-82.4,43.3],
     [-82.0,43.0],[-81.5,43.2],[-81.0,43.6],[-80.5,44.0],[-80.0,44.5],[-79.8,45.0],
     [-80.0,45.5],[-80.5,45.8],[-81.2,46.1],[-81.8,46.3],[-82.5,46.3],[-83.2,46.2],
     [-83.8,46.0],[-84.2,45.9],[-84.5,45.8]],
    // Lake Erie
    [[-83.5,41.7],[-83.0,41.5],[-82.2,41.4],[-81.5,41.5],[-81.0,41.7],[-80.5,42.0],
     [-80.0,42.3],[-79.5,42.5],[-79.0,42.8],[-78.8,42.7],[-79.2,42.5],[-79.8,42.2],
     [-80.5,42.0],[-81.2,41.9],[-82.0,41.8],[-82.8,41.8],[-83.5,41.7]],
    // Lake Ontario
    [[-79.8,43.3],[-79.2,43.3],[-78.5,43.4],[-77.8,43.5],[-77.0,43.6],[-76.3,43.8],
     [-75.8,44.1],[-76.0,44.2],[-76.8,44.2],[-77.5,44.1],[-78.2,43.9],[-78.8,43.7],
     [-79.3,43.5],[-79.8,43.3]],
  ];

  greatLakes.forEach(lake => {
    ctx.beginPath();
    lake.forEach((c, i) => {
      const px = ((c[0] + 180) / 360) * MAP_W;
      const py = ((90 - c[1]) / 180) * MAP_H;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.closePath();
    ctx.fill();
  });

  ctx.fillStyle = '#fff';                            // restore for any future draws

  /* ── Sample Land Mask → 3-D Dot Positions ────────────────── */

  const imgData = ctx.getImageData(0, 0, MAP_W, MAP_H).data;
  const positions = [];
  const R = 1;
  const SPACING = 12;                               // half as many dots

  for (let y = 0; y < MAP_H; y += SPACING) {
    for (let x = 0; x < MAP_W; x += SPACING) {
      if (imgData[(y * MAP_W + x) * 4] > 128) {
        const lng = (x / MAP_W) * 360 - 180;
        const lat = 90 - (y / MAP_H) * 180;
        const phi   = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        positions.push(
          -R * Math.sin(phi) * Math.cos(theta),
           R * Math.cos(phi),
           R * Math.sin(phi) * Math.sin(theta)
        );
      }
    }
  }

  console.log(`Globe dots: ${positions.length / 3}`);

  /* ── Circular Dot Texture ────────────────────────────────── */

  const dotCanvas = document.createElement('canvas');
  dotCanvas.width = 64;
  dotCanvas.height = 64;
  const dc = dotCanvas.getContext('2d');
  const grad = dc.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0.0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.35, 'rgba(255,255,255,0.85)');
  grad.addColorStop(0.7, 'rgba(255,255,255,0.15)');
  grad.addColorStop(1.0, 'rgba(255,255,255,0)');
  dc.fillStyle = grad;
  dc.fillRect(0, 0, 64, 64);
  const dotTexture = new THREE.CanvasTexture(dotCanvas);

  /* ── Dot Globe Points (custom shader for facing-based fade) ── */

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

  const renderSize = renderer.getSize(new THREE.Vector2());

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uMap:   { value: dotTexture },
      uSize:  { value: 0.078 },
      uScale: { value: renderSize.y / 2.0 },
      uColor: { value: new THREE.Color(0xaaaaaa) },
    },
    vertexShader: `
      uniform float uSize;
      uniform float uScale;
      varying float vFacing;

      void main() {
        vec3 worldNormal = normalize(mat3(modelMatrix) * position);
        vec3 worldPos    = (modelMatrix * vec4(position, 1.0)).xyz;
        vec3 viewDir     = normalize(cameraPosition - worldPos);
        vFacing = dot(worldNormal, viewDir);

        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = uSize * (uScale / -mvPos.z);
        gl_Position  = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform sampler2D uMap;
      uniform vec3 uColor;
      varying float vFacing;

      void main() {
        float tex = texture2D(uMap, gl_PointCoord).a;

        float facing;
        if (vFacing > 0.0) {
          float edgeDim = smoothstep(0.0, 0.5, vFacing);
          facing = mix(0.1, 0.45, edgeDim);
        } else {
          facing = 0.1 * smoothstep(-0.2, 0.0, vFacing);
        }
        float alpha = tex * facing;

        if (alpha < 0.01) discard;
        gl_FragColor = vec4(uColor, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
  });

  const dots = new THREE.Points(geo, mat);
  dots.renderOrder = 1;                              // render dots on top of atmosphere
  globe.add(dots);

  /* ── Surface Atmosphere (limb-brightening on the globe) ────── */

  // FrontSide sphere at globe radius — dark at center, bright at edges
  // Atmosphere sits BEHIND the dots so it doesn't brighten them
  const atmosMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.998, 128, 64),
    new THREE.ShaderMaterial({
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vViewPos;
        void main() {
          vNormal   = normalize(normalMatrix * normal);
          vViewPos  = (modelViewMatrix * vec4(position, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vViewPos;
        void main() {
          vec3 viewDir = normalize(-vViewPos);
          float d = clamp(dot(vNormal, viewDir), 0.0, 1.0);

          // Translucent gray surface — visible across entire globe,
          // brighter toward the edges like looking through more layers
          float base = 0.03;                          // darker center wash
          float rim  = pow(1.0 - d, 1.8);            // gradual ramp to edges
          float glow = base + rim * 0.35;
          gl_FragColor = vec4(0.75, 0.75, 0.75, glow);
        }
      `,
      transparent: true,
      side: THREE.FrontSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    })
  );
  atmosMesh.renderOrder = 0;                         // render atmosphere behind dots
  globe.add(atmosMesh);

  /* ── Ambient Floating Particles (static, don't rotate) ────── */

  const PARTICLE_COUNT = 1500;
  const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
  const particleAlphas    = new Float32Array(PARTICLE_COUNT);
  const particlePhases    = new Float32Array(PARTICLE_COUNT);
  const particleSizes     = new Float32Array(PARTICLE_COUNT);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const u     = Math.random();
    const v     = Math.random();
    const theta = 2.0 * Math.PI * u;
    const phi   = Math.acos(2.0 * v - 1.0);
    const r     = 0.97 + Math.random() * 0.04;

    particlePositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    particlePositions[i * 3 + 1] = r * Math.cos(phi);
    particlePositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    particleAlphas[i] = 0.15 + Math.random() * 0.85; // varying visibility
    particlePhases[i] = Math.random() * 6.2832;
    particleSizes[i]  = 0.03 + Math.random() * 0.048; // range from small to land-dot sized
  }

  const particleGeo = new THREE.BufferGeometry();
  particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
  particleGeo.setAttribute('aAlpha',   new THREE.BufferAttribute(particleAlphas, 1));
  particleGeo.setAttribute('aPhase',   new THREE.BufferAttribute(particlePhases, 1));
  particleGeo.setAttribute('aSize',    new THREE.BufferAttribute(particleSizes, 1));

  const particleMat = new THREE.ShaderMaterial({
    uniforms: {
      uMap:   { value: dotTexture },
      uScale: { value: renderSize.y / 2.0 },
      uTime:  { value: 0.0 },
    },
    vertexShader: `
      uniform float uScale;
      uniform float uTime;
      attribute float aAlpha;
      attribute float aPhase;
      attribute float aSize;
      varying float vAlpha;
      varying float vFacing;

      void main() {
        vec3 dir = normalize(position);
        float bob = sin(uTime * 0.4 + aPhase) * 0.008;
        vec3 pos = position + dir * bob;

        vec3 worldNormal = normalize(mat3(modelMatrix) * pos);
        vec3 worldPos    = (modelMatrix * vec4(pos, 1.0)).xyz;
        vec3 viewDir     = normalize(cameraPosition - worldPos);
        vFacing = dot(worldNormal, viewDir);

        vAlpha = aAlpha;
        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = aSize * (uScale / -mvPos.z);
        gl_Position  = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform sampler2D uMap;
      varying float vAlpha;
      varying float vFacing;

      void main() {
        float tex = texture2D(uMap, gl_PointCoord).a;

        // Only show on the visible hemisphere, fade at edges
        float facing = vFacing > 0.0
          ? smoothstep(0.0, 0.3, vFacing) * vAlpha
          : 0.0;

        float alpha = tex * facing * 0.3;
        if (alpha < 0.01) discard;
        gl_FragColor = vec4(0.7, 0.7, 0.7, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
  });

  const particles = new THREE.Points(particleGeo, particleMat);
  particles.renderOrder = 2;
  globe.add(particles);                                // rotates with the globe

  /* ── Initial Orientation (New York ~74°W, rotating toward Europe) ── */

  // New York is at ~74°W. In our coordinate system, lng=-90 faces
  // camera by default, so we need a small negative Y rotation to
  // shift from -90 to -74 (about +16° = +0.28 rad toward east)
  // Start with mid-Pacific centered, US visible on far right
  globe.rotation.y = 0.4;
  globe.rotation.x = 0.45;              // tilt globe to look down from higher north

  // Rotate toward Europe (negative Y = eastward)
  const rotSpeed = -0.00025;

  /* ── Reveal ──────────────────────────────────────────────── */

  document.getElementById('loading').classList.add('hidden');

  /* ── Render Loop ─────────────────────────────────────────── */

  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);

    particleMat.uniforms.uTime.value = clock.getElapsedTime();
    globe.rotation.y += rotSpeed;

    renderer.render(scene, camera);
  }

  animate();

  /* ── Resize Handler ──────────────────────────────────────── */

  window.addEventListener('resize', () => {
    const s = Math.min(innerWidth, innerHeight);
    camera.aspect = 1;
    camera.updateProjectionMatrix();
    renderer.setSize(s, s);
    mat.uniforms.uScale.value = s / 2.0;
    particleMat.uniforms.uScale.value = s / 2.0;
  });

})();
</script>
</body>
</html>
